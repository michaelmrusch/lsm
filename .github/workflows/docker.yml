# Build the production image and push it to GitHub's container registry
# (ghcr.io/michaelmrusch/lsm) on every push to main. No secrets needed:
# the workflow's own GITHUB_TOKEN may push packages. After the first run,
# make the package public once (repo → Packages → lsm → Package settings →
# Change visibility) so the server can pull it without logging in.
name: docker image

on:
  push:
    branches: [main]

# Two pushes in quick succession must not race: the slower (older) build
# would finish last and overwrite :latest with outdated code — this exact
# thing shipped a stale image once. Newest push wins, older in-flight
# builds are cancelled.
concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # latest for `docker compose pull`, the commit SHA for rollbacks
          tags: |
            ghcr.io/michaelmrusch/lsm:latest
            ghcr.io/michaelmrusch/lsm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
